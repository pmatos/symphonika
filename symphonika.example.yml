state:
  root: ./.symphonika

polling:
  interval_ms: 30000

# Optional global cap on the total number of concurrent provider runs across
# all projects. Omit (or comment out) for unbounded. See ADR 0053.
# global:
#   max_in_flight: 8

providers:
  codex:
    command: "codex -p symphonika -c sandbox_mode=danger-full-access -c approval_policy=never --dangerously-bypass-approvals-and-sandbox app-server"
  claude:
    command: "claude -p --dangerously-skip-permissions --verbose --input-format stream-json --output-format stream-json"

projects:
  - name: symphonika
    disabled: false
    weight: 1
    # Per-project cap on the number of concurrent provider runs for this
    # project. Default 1 (legacy serial behavior). Setting >1 requires a
    # per-project shared bare-repo fetch lock — see ADR 0053. Omit (or
    # leave commented) to keep the default.
    # max_in_flight: 1
    tracker:
      kind: github
      owner: pmatos
      repo: symphonika
      token: "$GITHUB_TOKEN"
    issue_filters:
      states: ["open"]
      labels_all: ["agent-ready"]
      labels_none: ["blocked", "needs-human", "sym:stale"]
    priority:
      labels:
        "priority:critical": 0
        "priority:high": 1
        "priority:medium": 2
        "priority:low": 3
      default: 99
    workspace:
      root: ./.symphonika/workspaces/symphonika
      git:
        remote: git@github.com:pmatos/symphonika.git
        base_branch: main
      # hooks:
      #   after_create:
      #     command: "npm ci"
      #     timeout_ms: 600000
      #   before_run:
      #     command: "./scripts/bootstrap.sh"
      #   after_run:
      #     command: "npm test"
      #   before_remove:
      #     command: "./scripts/archive-evidence.sh"
    agent:
      provider: codex
    workflow: ./WORKFLOW.md
